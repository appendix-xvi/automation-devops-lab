stages:
  - validate
  - terraform_plan
  - terraform_apply
  - ansible_configure

variables:
  TF_IN_AUTOMATION: "true"
  ANSIBLE_HOST_KEY_CHECKING: "False"

before_script:
  - echo "Starting AWS infrastructure automation pipeline..."

terraform_validate:
  stage: validate
  script:
    - cd terraform
    - terraform fmt -check -recursive
    - terraform init -backend=false -input=false
    - terraform validate

terraform_plan:
  stage: terraform_plan
  script:
    - cd terraform
    - terraform init -input=false
    - terraform plan -out=tfplan.out
  artifacts:
    paths:
      - terraform/tfplan.out
    expire_in: 1 week

terraform_apply:
  stage: terraform_apply
  when: manual
  allow_failure: false
  dependencies:
    - terraform_plan
  script:
    - cd terraform
    - terraform init -input=false
    - terraform apply -auto-approve tfplan.out

ansible_configure:
  stage: ansible_configure
  when: manual
  allow_failure: false
  script:
    - cd ansible
    - ansible-playbook -i aws_ec2_inventory.py prometheus_grafana.yml
